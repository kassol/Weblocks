<!doctype html>
<!-- PROTOTYPE — Three first-session experiences, switchable with ?variant=A|B|C. -->
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Weblocks 首次体验原型</title>
  <style>
    :root {
      color-scheme: light;
      font-family: ui-rounded, "SF Pro Rounded", "PingFang SC", system-ui, sans-serif;
      --ink: #17324d;
      --muted: #547089;
      --blue: #1769e0;
      --orange: #f48b17;
      --yellow: #ffd84b;
      --green: #18875c;
      --red: #c93b42;
      --panel: #fffffff2;
      --shadow: 0 14px 40px #17324d24;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #eaf5ff; color: var(--ink); }
    body { min-height: 100dvh; overflow-x: hidden; }
    button { min-width: 48px; min-height: 48px; border: 0; border-radius: 16px; padding: 10px 15px; background: white; color: inherit; box-shadow: 0 6px 18px #17324d22; font: 800 15px/1.15 inherit; cursor: pointer; touch-action: manipulation; }
    button:hover, button:focus-visible { outline: 3px solid #1677ff; outline-offset: 2px; }
    button:disabled { opacity: .45; cursor: default; }
    h1, h2, h3, p { margin-top: 0; }
    .app { min-height: 100dvh; }
    .eyebrow { color: var(--blue); font-size: 12px; font-weight: 950; letter-spacing: .12em; text-transform: uppercase; }
    .muted { color: var(--muted); }
    .card { border: 1px solid #fff; border-radius: 24px; background: var(--panel); box-shadow: var(--shadow); backdrop-filter: blur(14px); }
    .board-wrap { position: relative; width: min(100%, 820px); margin-inline: auto; }
    .board {
      position: relative;
      width: 100%;
      aspect-ratio: 8 / 5;
      overflow: hidden;
      border: clamp(8px, 1.4vw, 14px) solid #fff;
      border-radius: 28px;
      background: #bce7ff;
      box-shadow: 0 22px 60px #1d5d8a35, inset 0 0 0 2px #3d8eb333;
      touch-action: none;
      user-select: none;
    }
    .board.playground { background: #dff1d3; }
    .board-grid { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(5, 1fr); }
    .cell { position: relative; border: 1px solid #1676a21d; }
    .challenge .cell:nth-child(n+2) { background-image: repeating-linear-gradient(135deg, #fff0 0 12px, #ffffff25 12px 18px); }
    .cell.bank { z-index: 1; display: grid; place-items: center; background: #8acb62 !important; border-color: #4d9c3c55; color: #17324d; font-weight: 950; }
    .cell.bank::before { content: ""; position: absolute; inset: 10%; border-radius: 16px; background: #e8ffc8aa; border: 2px dashed #315c2d88; }
    .cell.bank span { position: relative; z-index: 1; text-align: center; text-shadow: 0 1px white; }
    .cell.suggested::after { content: "下一块"; position: absolute; z-index: 6; inset: 10%; display: grid; place-items: center; border: 4px dashed #6b4d00; border-radius: 14px; background: #ffe46da8; color: #493500; font-size: clamp(10px, 1.7vw, 16px); font-weight: 950; animation: pulse 1s infinite alternate; }
    @keyframes pulse { to { transform: scale(.92); opacity: .72; } }
    .part, .ghost {
      z-index: 4;
      margin: 7%;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      border: 3px solid #ffffffc9;
      border-radius: clamp(10px, 1.8vw, 18px);
      color: white;
      font-weight: 950;
      text-shadow: 0 1px 2px #0006;
      box-shadow: inset 0 -10px #00000014, 0 9px 14px #17324d33;
      background-image: radial-gradient(circle at 25% 22%, #ffffff90 0 8%, #fff0 9%), radial-gradient(circle at 75% 22%, #ffffff90 0 8%, #fff0 9%);
      touch-action: none;
    }
    .part { cursor: grab; }
    .part:active { cursor: grabbing; }
    .part.beam, .ghost.beam { background-color: var(--blue); }
    .part.cube, .ghost.cube { background-color: var(--orange); }
    .ghost { z-index: 5; pointer-events: none; opacity: .68; outline: 5px solid #fff; }
    .ghost.invalid { background-color: var(--red); }
    .ghost.valid { background-color: var(--green); }
    .ghost-label { position: absolute; z-index: 8; left: 50%; bottom: 8px; transform: translateX(-50%); min-width: max-content; padding: 5px 9px; border-radius: 999px; background: #17324de8; color: white; font-size: 12px; font-weight: 900; pointer-events: none; }
    .board-caption { display: flex; justify-content: space-between; gap: 12px; margin-top: 10px; color: var(--muted); font-size: 13px; font-weight: 750; }
    .palette { display: flex; align-items: stretch; gap: 10px; flex-wrap: wrap; }
    .part-choice { display: grid; grid-template-columns: 38px auto; align-items: center; gap: 9px; text-align: left; }
    .swatch { width: 38px; height: 28px; border: 3px solid #fff; border-radius: 9px; box-shadow: inset 0 -7px #0001; }
    .swatch.beam { background: var(--blue); }
    .swatch.cube { background: var(--orange); }
    .held-tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .held-tools .status { min-width: 160px; padding: 8px 11px; border-radius: 13px; background: #e8f4ff; font-size: 13px; font-weight: 850; }
    .danger { color: #9d2630; }
    .primary { background: var(--blue); color: white; }
    .hint-button { background: #fff4ba; color: #523f00; }
    .live { position: fixed; z-index: 40; top: max(12px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); width: max-content; max-width: calc(100vw - 24px); padding: 10px 16px; border-radius: 999px; background: #17324ded; color: white; box-shadow: var(--shadow); text-align: center; font-weight: 900; pointer-events: none; }
    .success { position: absolute; z-index: 12; inset: 8%; display: grid; place-items: center; padding: 24px; border-radius: 28px; background: #fffffff2; box-shadow: 0 18px 70px #17324d55; text-align: center; }
    .success .star { font-size: clamp(48px, 10vw, 86px); animation: pop .5s both; }
    @keyframes pop { from { transform: scale(.2) rotate(-20deg); } }
    .progression { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; color: var(--muted); font-size: 12px; font-weight: 850; }
    .progression span { padding: 5px 9px; border-radius: 999px; background: #eaf0f5; }
    .progression .now { background: #d8eaff; color: #0d56b2; }

    .variant-a { min-height: 100dvh; padding: 20px 20px 116px; display: grid; align-content: center; gap: 14px; background: radial-gradient(circle at 20% 0, #fff 0, #eaf5ff 42%, #d7efff 100%); }
    .a-top { width: min(100%, 820px); margin-inline: auto; display: flex; justify-content: space-between; align-items: end; gap: 12px; }
    .a-top h1 { margin: 3px 0 0; font-size: clamp(24px, 4vw, 38px); }
    .a-stage { position: relative; width: min(100%, 820px); margin-inline: auto; }
    .a-prompt { position: absolute; z-index: 10; top: 14px; left: 14px; max-width: min(390px, calc(100% - 28px)); display: flex; gap: 10px; align-items: center; padding: 11px 14px; border-radius: 18px; background: #ffffffe8; box-shadow: 0 8px 25px #17324d2a; font-weight: 850; }
    .a-prompt .face { flex: 0 0 auto; font-size: 26px; }
    .a-tray { position: fixed; z-index: 15; left: 50%; bottom: 74px; transform: translateX(-50%); width: min(860px, calc(100vw - 20px)); padding: 10px; display: flex; justify-content: center; gap: 10px; align-items: center; }

    .variant-b { min-height: 100dvh; display: grid; grid-template-columns: minmax(270px, 340px) 1fr; background: #f4f0e7; }
    .b-guide { z-index: 2; padding: 28px 24px 100px; background: #fffaf0; border-right: 1px solid #d7ccb4; box-shadow: 10px 0 30px #634e2920; }
    .b-guide h1 { margin-bottom: 5px; font-size: 30px; }
    .steps { display: grid; gap: 9px; margin: 22px 0; }
    .step { display: grid; grid-template-columns: 34px 1fr; gap: 9px; align-items: center; padding: 10px; border-radius: 16px; background: #eee8db; color: #6c6252; font-weight: 850; }
    .step .number { display: grid; place-items: center; width: 34px; height: 34px; border-radius: 50%; background: white; }
    .step.current { background: #dcecff; color: #124f99; outline: 3px solid #84b8f5; }
    .step.done { background: #ddf4e8; color: #176345; }
    .b-guide .palette, .b-guide .held-tools { display: grid; }
    .b-guide button { width: 100%; }
    .b-work { padding: 26px 28px 110px; display: grid; align-content: center; gap: 14px; min-width: 0; }
    .b-instruction { padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; gap: 12px; font-size: 17px; font-weight: 900; }

    .variant-c { min-height: 100dvh; padding: 22px 22px 120px; display: grid; align-content: center; background: linear-gradient(#ddf3d6, #c9e8f7); }
    .c-head { position: fixed; z-index: 8; top: max(16px, env(safe-area-inset-top)); left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
    .c-head > * { pointer-events: auto; }
    .c-head h1 { margin: 0; font-size: 24px; }
    .c-question { width: 50px; padding: 0; border-radius: 50%; }
    .c-tray { position: fixed; z-index: 15; left: 50%; bottom: 74px; transform: translateX(-50%); width: min(720px, calc(100vw - 20px)); padding: 10px; display: flex; justify-content: center; gap: 10px; align-items: center; }
    .mission-invite { position: absolute; z-index: 11; right: 16px; top: 16px; width: min(330px, calc(100% - 32px)); padding: 20px; }
    .mission-invite h2 { margin-bottom: 8px; }

    .debug { position: fixed; z-index: 18; right: 12px; bottom: 74px; width: min(255px, calc(100vw - 24px)); }
    .debug summary { width: max-content; margin-left: auto; padding: 7px 11px; border-radius: 999px; background: #17324de8; color: white; cursor: pointer; font-size: 12px; font-weight: 850; }
    .debug pre { max-height: 35vh; overflow: auto; margin: 6px 0 0; padding: 10px; border-radius: 14px; background: #10263bf0; color: #dff4ff; box-shadow: var(--shadow); font: 11px/1.4 ui-monospace, monospace; white-space: pre-wrap; }
    .debug button { min-height: 38px; margin: 6px 0 0 auto; display: block; padding: 6px 10px; border-radius: 12px; font-size: 11px; }
    .variant-switcher { position: fixed; z-index: 30; left: 50%; bottom: max(12px, env(safe-area-inset-bottom)); transform: translateX(-50%); display: flex; align-items: center; gap: 9px; padding: 7px; border-radius: 999px; background: #10263b; color: white; box-shadow: 0 10px 36px #07152266; }
    .variant-switcher button { min-width: 46px; min-height: 42px; padding: 8px; background: #ffffff18; color: white; box-shadow: none; }
    .variant-label { min-width: 190px; text-align: center; font-weight: 900; }

    @media (max-width: 760px) {
      button { min-height: 48px; font-size: 13px; }
      .variant-a, .variant-c { padding: 82px 10px 180px; align-content: start; }
      .a-top { align-items: start; }
      .a-top .progression { display: none; }
      .a-prompt { font-size: 13px; }
      .a-tray, .c-tray { bottom: 68px; align-items: stretch; flex-wrap: wrap; }
      .part-choice { grid-template-columns: 28px auto; padding: 7px 9px; }
      .swatch { width: 28px; height: 22px; }
      .held-tools { justify-content: center; }
      .held-tools .status { display: none; }
      .variant-b { display: block; padding-bottom: 180px; }
      .b-guide { padding: 18px 14px; border: 0; box-shadow: none; }
      .b-guide h1 { font-size: 24px; }
      .steps { grid-template-columns: repeat(3, 1fr); margin: 12px 0; }
      .step { display: block; padding: 7px; text-align: center; font-size: 11px; }
      .step .number { margin: 0 auto 4px; }
      .b-guide .palette, .b-guide .held-tools { display: flex; }
      .b-guide .muted, .b-guide .progression { display: none; }
      .b-guide button { width: auto; flex: 1; }
      .b-work { padding: 12px 10px; display: block; }
      .b-instruction { margin-bottom: 10px; font-size: 13px; }
      .board { border-radius: 20px; }
      .board-caption { font-size: 10px; }
      .mission-invite { top: 8px; right: 8px; width: calc(100% - 16px); padding: 14px; }
      .debug { right: 8px; bottom: 68px; }
      .variant-label { min-width: 146px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <main id="app" class="app"></main>
  <div id="live" class="live" role="status" aria-live="polite" hidden></div>
  <details class="debug">
    <summary>查看原型状态</summary>
    <pre id="debug-state"></pre>
    <button id="simulate-idle">模拟长时间没操作</button>
  </details>
  <nav class="variant-switcher" id="variant-switcher" aria-label="原型方案切换">
    <button id="variant-prev" aria-label="上一个方案">←</button>
    <span class="variant-label" id="variant-label"></span>
    <button id="variant-next" aria-label="下一个方案">→</button>
  </nav>

  <script type="module">
    import { BOARD, PART_KINDS, footprint, placementError, isChallengeComplete, suggestedCell, liftedPointerY } from "./model.mjs";

    const variants = {
      A: { name: "马上开玩", idleSeconds: 18, startHint: 0 },
      B: { name: "一步一步", idleSeconds: 8, startHint: 1 },
      C: { name: "先玩再接任务", idleSeconds: 25, startHint: 0 }
    };
    const params = new URLSearchParams(location.search);
    const variant = variants[params.get("variant")] ? params.get("variant") : "A";
    const state = {
      variant,
      phase: variant === "C" ? "warmup" : "challenge",
      parts: [],
      held: null,
      candidate: null,
      nextId: 1,
      placements: 0,
      failedPlacements: 0,
      hintLevel: variants[variant].startHint,
      hintReason: variants[variant].startHint ? "always-visible" : "none",
      firstResultMs: null,
      completedMs: null,
      input: "none",
      lastAction: variant === "C" ? "自由热身已开始" : "挑战已开始",
      startedAt: performance.now()
    };
    let idleTimer;
    let liveTimer;

    const elapsed = () => Math.round(performance.now() - state.startedAt);
    const complete = () => state.phase === "challenge" && isChallengeComplete(state.parts);
    const promptText = () => {
      if (complete()) return "桥接通了！小机器人可以到达星星岛。";
      if (state.phase === "warmup") return state.parts.length ? "第一块完成！想接一个真正的任务吗？" : "随便拿一块积木，在草地上放下试试。";
      if (state.held) return "移动绿色 ghost，点一下放下；需要时可以先旋转。";
      if (!state.parts.length) return variant === "B" ? "先拿起蓝色 2 格积木。" : "拿一块积木，从黄色起点旁边开始搭桥。";
      return "让积木首尾相连，一直搭到星星终点。";
    };

    function announce(message) {
      state.lastAction = message;
      const live = document.querySelector("#live");
      live.textContent = message;
      live.hidden = false;
      clearTimeout(liveTimer);
      liveTimer = setTimeout(() => live.hidden = true, 1800);
    }

    function resetIdleTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => showHint("inactivity"), variants[variant].idleSeconds * 1000);
    }

    function showHint(reason = "manual") {
      state.hintLevel = Math.max(state.hintLevel, state.failedPlacements >= 2 || reason === "inactivity" ? 2 : 1);
      state.hintReason = reason;
      announce(state.hintLevel > 1 ? "看黄色虚线：把下一块接在那里。" : "提示：从起点旁边开始，让积木一块接一块。" );
      render();
      resetIdleTimer();
    }

    function holdNew(kind) {
      if (state.held?.original) state.parts.push(state.held.original);
      state.held = { kind, rotation: 0, original: null };
      state.candidate = { kind, rotation: 0, x: state.phase === "challenge" ? 1 : 3, y: 2 };
      announce(`已拿起${PART_KINDS[kind].label}`);
      render();
      resetIdleTimer();
    }

    function holdExisting(id) {
      if (state.held) return;
      const original = state.parts.find(part => part.id === id);
      if (!original) return;
      state.parts = state.parts.filter(part => part.id !== id);
      state.held = { kind: original.kind, rotation: original.rotation, original };
      state.candidate = { ...original };
      announce("已拿起这个部件；ghost 会跟随指针或手指");
      render();
      resetIdleTimer();
    }

    function rotateHeld(delta) {
      if (!state.held || !state.candidate) return;
      state.held.rotation = (state.held.rotation + delta + 4) % 4;
      state.candidate.rotation = state.held.rotation;
      announce(`已${delta < 0 ? "左" : "右"}转 90°`);
      render();
      resetIdleTimer();
    }

    function cancelHeld() {
      if (!state.held) return;
      if (state.held.original) state.parts.push(state.held.original);
      announce(state.held.original ? "已放回原位" : "已取消新部件");
      state.held = null;
      state.candidate = null;
      render();
      resetIdleTimer();
    }

    function deleteHeld() {
      if (!state.held) return;
      announce("部件已删除");
      state.held = null;
      state.candidate = null;
      render();
      resetIdleTimer();
    }

    function commitCandidate() {
      if (!state.held || !state.candidate) return;
      const error = placementError(state.parts, state.candidate);
      if (error) {
        state.failedPlacements += 1;
        announce(`${error}，ghost 变绿时再放下`);
        if (state.failedPlacements >= 2) state.hintLevel = 2;
        render();
        resetIdleTimer();
        return;
      }
      const placed = { ...state.candidate, id: state.held.original?.id ?? state.nextId++ };
      state.parts.push(placed);
      state.placements += 1;
      if (state.firstResultMs === null) state.firstResultMs = elapsed();
      state.held = null;
      state.candidate = null;
      if (complete() && state.completedMs === null) {
        state.completedMs = elapsed();
        announce("成功！桥已经连通");
      } else announce(state.phase === "warmup" ? "第一块放好了！" : "连接成功，继续往终点搭");
      render();
      resetIdleTimer();
    }

    function startChallenge() {
      state.phase = "challenge";
      state.parts = [];
      state.held = null;
      state.candidate = null;
      state.hintLevel = 0;
      state.hintReason = "none";
      state.placements = 0;
      state.failedPlacements = 0;
      state.completedMs = null;
      announce("新任务：搭一座桥到星星岛");
      render();
      resetIdleTimer();
    }

    function restart() {
      state.parts = [];
      state.held = null;
      state.candidate = null;
      state.placements = 0;
      state.failedPlacements = 0;
      state.completedMs = null;
      state.hintLevel = variants[variant].startHint;
      state.hintReason = state.hintLevel ? "always-visible" : "none";
      announce("已重新开始，可以试另一种搭法");
      render();
      resetIdleTimer();
    }

    function cellFromPointer(event) {
      const board = event.currentTarget.closest?.(".board") ?? document.querySelector(".board");
      const rect = board.getBoundingClientRect();
      const liftedY = liftedPointerY(event.clientY, event.pointerType, Boolean(state.held));
      return {
        x: Math.max(0, Math.min(BOARD.columns - 1, Math.floor((event.clientX - rect.left) / rect.width * BOARD.columns))),
        y: Math.max(0, Math.min(BOARD.rows - 1, Math.floor((liftedY - rect.top) / rect.height * BOARD.rows)))
      };
    }

    function moveGhost(event) {
      if (!state.held) return;
      state.input = event.pointerType || "mouse";
      const cell = cellFromPointer(event);
      state.candidate = { ...state.candidate, ...cell, kind: state.held.kind, rotation: state.held.rotation };
      renderBoardOnly();
      renderDebug();
    }

    function partMarkup(part, className = "part") {
      const cells = footprint(part);
      const width = Math.max(...cells.map(cell => cell.x)) - Math.min(...cells.map(cell => cell.x)) + 1;
      const height = Math.max(...cells.map(cell => cell.y)) - Math.min(...cells.map(cell => cell.y)) + 1;
      const error = className === "ghost" ? placementError(state.parts, part) : null;
      const tag = className === "ghost" ? "div" : "button";
      return `<${tag} class="${className} ${part.kind} ${className === "ghost" ? error ? "invalid" : "valid" : ""}" data-part-id="${part.id ?? ""}" style="grid-column:${part.x + 1}/span ${width};grid-row:${part.y + 1}/span ${height}" ${className === "ghost" ? "aria-hidden=\"true\"" : `aria-label="拿起${PART_KINDS[part.kind].label}"`}><span>${PART_KINDS[part.kind].length}格</span></${tag}>`;
    }

    function boardMarkup() {
      const challenge = state.phase === "challenge";
      const hint = challenge && state.hintLevel >= 2 && !complete() ? suggestedCell(state.parts) : null;
      const cells = Array.from({ length: BOARD.columns * BOARD.rows }, (_, index) => {
        const x = index % BOARD.columns, y = Math.floor(index / BOARD.columns);
        const bank = challenge && ((x === BOARD.start.x && y === BOARD.start.y) || (x === BOARD.finish.x && y === BOARD.finish.y));
        const suggested = hint && hint.x === x && hint.y === y;
        const label = x === BOARD.start.x ? "🤖<br>起点" : "⭐<br>终点";
        return `<div class="cell ${bank ? "bank" : ""} ${suggested ? "suggested" : ""}" style="grid-column:${x + 1};grid-row:${y + 1}">${bank ? `<span>${label}</span>` : ""}</div>`;
      }).join("");
      const ghost = state.held && state.candidate ? `${partMarkup(state.candidate, "ghost")}<span class="ghost-label">${placementError(state.parts, state.candidate) ?? "可以放下"}</span>` : "";
      return `<div class="board-wrap"><div class="board ${challenge ? "challenge" : "playground"}" aria-label="${challenge ? "搭桥挑战区" : "自由热身搭建区"}"><div class="board-grid" id="board-grid">${cells}${state.parts.map(part => partMarkup(part)).join("")}${ghost}</div></div><div class="board-caption"><span>${challenge ? "蓝色条纹是河面；积木只需连通两岸" : "这里没有输赢，先试着放下一块"}</span><span>鼠标或触控均可</span></div>${complete() ? successMarkup() : ""}${variant === "C" && state.phase === "warmup" && state.parts.length ? inviteMarkup() : ""}</div>`;
    }

    function paletteMarkup() {
      if (state.held) return `<div class="held-tools"><span class="status">拿着：${PART_KINDS[state.held.kind].label}<br><small>${state.candidate ? placementError(state.parts, state.candidate) ?? "绿色 · 可以放下" : "移动到搭建区"}</small></span><button data-action="left" aria-label="向左旋转 90 度">↶ 90°</button><button data-action="right" aria-label="向右旋转 90 度">↷ 90°</button><button data-action="cancel">${state.held.original ? "放回" : "取消"}</button>${state.held.original ? `<button class="danger" data-action="delete">删除</button>` : ""}</div>`;
      return `<div class="palette"><button class="part-choice" data-kind="beam"><span class="swatch beam"></span><span>蓝色<br><small>2 格积木</small></span></button><button class="part-choice" data-kind="cube"><span class="swatch cube"></span><span>橙色<br><small>1 格积木</small></span></button></div>`;
    }

    function successMarkup() {
      return `<section class="success" aria-label="挑战完成"><div><div class="star">🌟</div><h2>桥接通啦！</h2><p>你用了 ${state.parts.length} 个部件，每一种连通方法都算成功。</p><div class="progression"><span>✓ 搭直桥</span><span class="now">下一题：绕开礁石</span><span>以后：限制部件数</span></div><p><button class="primary" data-action="restart">换一种搭法</button></p></div></section>`;
    }

    function inviteMarkup() {
      return `<section class="mission-invite card"><div class="eyebrow">新任务</div><h2>帮机器人过河？</h2><p>刚才那样连接积木，把起点和星星岛连起来。</p><button class="primary" data-action="start-challenge">开始搭桥</button></section>`;
    }

    function stepsMarkup() {
      const hasPart = state.placements > 0 || state.held;
      return `<div class="steps"><div class="step ${hasPart ? "done" : "current"}"><span class="number">${hasPart ? "✓" : "1"}</span><span>拿起积木</span></div><div class="step ${state.parts.length ? "done" : hasPart ? "current" : ""}"><span class="number">${state.parts.length ? "✓" : "2"}</span><span>接在起点旁</span></div><div class="step ${complete() ? "done" : state.parts.length ? "current" : ""}"><span class="number">${complete() ? "✓" : "3"}</span><span>连到星星岛</span></div></div>`;
    }

    function renderA() {
      return `<section class="variant-a"><header class="a-top"><div><div class="eyebrow">第一次挑战</div><h1>帮机器人搭桥过河</h1></div><div class="progression"><span class="now">1 搭直桥</span><span>2 绕礁石</span><span>3 限部件</span></div></header><div class="a-stage"><div class="a-prompt"><span class="face">🤖</span><span>${promptText()}</span><button class="hint-button" data-action="hint">提示</button></div>${boardMarkup()}</div><footer class="a-tray card">${paletteMarkup()}</footer></section>`;
    }

    function renderB() {
      return `<section class="variant-b"><aside class="b-guide"><div class="eyebrow">搭桥训练营 · 第 1 课</div><h1>一步一步来</h1><p class="muted">目标：不用照着标准答案，只要把两岸连起来。</p>${stepsMarkup()}${paletteMarkup()}<p><button class="hint-button" data-action="hint">显示下一步位置</button></p><div class="progression"><span class="now">现在：无数量限制</span><span>接着：学会转弯</span><span>以后：限定 4 块</span></div></aside><main class="b-work"><div class="b-instruction card"><span>👉 ${promptText()}</span><span>${state.parts.length} 个部件</span></div>${boardMarkup()}</main></section>`;
    }

    function renderC() {
      const title = state.phase === "warmup" ? "先随便玩玩" : "机器人过河任务";
      return `<section class="variant-c"><header class="c-head"><h1>Weblocks · ${title}</h1><button class="c-question hint-button" data-action="hint" aria-label="需要提示">?</button></header>${boardMarkup()}<footer class="c-tray card">${paletteMarkup()}</footer></section>`;
    }

    function bindBoard() {
      const board = document.querySelector(".board");
      board?.addEventListener("pointermove", moveGhost);
      board?.addEventListener("pointerdown", event => {
        state.input = event.pointerType;
        if (state.held) moveGhost(event);
      });
      board?.addEventListener("pointerup", event => {
        state.input = event.pointerType;
        if (state.held) {
          moveGhost(event);
          commitCandidate();
        }
      });
      document.querySelectorAll(".part[data-part-id]").forEach(part => part.addEventListener("pointerdown", event => {
        event.stopPropagation();
        state.input = event.pointerType;
        holdExisting(Number(part.dataset.partId));
      }));
    }

    function bindActions() {
      document.querySelectorAll("[data-kind]").forEach(button => button.addEventListener("click", () => holdNew(button.dataset.kind)));
      document.querySelectorAll("[data-action]").forEach(button => button.addEventListener("click", event => {
        event.stopPropagation();
        ({ hint: showHint, left: () => rotateHeld(-1), right: () => rotateHeld(1), cancel: cancelHeld, delete: deleteHeld, restart, "start-challenge": startChallenge })[button.dataset.action]?.();
      }));
    }

    function renderBoardOnly() {
      const current = document.querySelector(".board-wrap");
      if (!current) return;
      const replacement = document.createElement("div");
      replacement.innerHTML = boardMarkup();
      current.replaceWith(replacement.firstElementChild);
      bindBoard();
      bindActions();
    }

    function renderDebug() {
      document.querySelector("#debug-state").textContent = JSON.stringify({
        variant: state.variant,
        phase: state.phase,
        operation: state.held ? state.held.original ? "holding-existing-part" : "holding-new-part" : "browsing",
        ghost: state.candidate ? { ...state.candidate, valid: !placementError(state.parts, state.candidate) } : null,
        placedParts: state.parts.length,
        placements: state.placements,
        failedPlacements: state.failedPlacements,
        hint: { level: state.hintLevel, reason: state.hintReason, automaticAfterSeconds: variants[variant].idleSeconds },
        firstVisibleResultMs: state.firstResultMs,
        challengeCompletedMs: state.completedMs,
        input: state.input,
        success: complete(),
        lastAction: state.lastAction
      }, null, 2);
    }

    function render() {
      document.querySelector("#app").innerHTML = ({ A: renderA, B: renderB, C: renderC })[variant]();
      bindBoard();
      bindActions();
      renderDebug();
    }

    function switchVariant(delta) {
      const keys = Object.keys(variants);
      const next = keys[(keys.indexOf(variant) + delta + keys.length) % keys.length];
      const query = new URLSearchParams(location.search);
      query.set("variant", next);
      location.search = query;
    }

    document.querySelector("#variant-prev").onclick = () => switchVariant(-1);
    document.querySelector("#variant-next").onclick = () => switchVariant(1);
    document.querySelector("#variant-label").textContent = `${variant} — ${variants[variant].name}`;
    document.querySelector("#simulate-idle").onclick = () => showHint("inactivity");
    if (!['localhost', '127.0.0.1'].includes(location.hostname)) document.querySelector("#variant-switcher").hidden = true;
    addEventListener("keydown", event => {
      if (["INPUT", "TEXTAREA"].includes(document.activeElement?.tagName) || document.activeElement?.isContentEditable) return;
      if (event.key === "ArrowLeft") switchVariant(-1);
      if (event.key === "ArrowRight") switchVariant(1);
      if (event.key === "Escape") cancelHeld();
      if (event.key.toLowerCase() === "q") rotateHeld(-1);
      if (["e", "r"].includes(event.key.toLowerCase())) rotateHeld(1);
    });

    render();
    resetIdleTimer();
  </script>
</body>
</html>
